<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>JioTV Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<style>

*{margin:0;padding:0;box-sizing:border-box}

html,body{
background:#000;
height:100vh;
width:100vw;
overflow:hidden;
font-family:system-ui
}

.shaka-video-container{
position:absolute;
inset:0;
width:100%;
height:100%
}

video{
width:100%;
height:100%;
background:#000;
object-fit:contain
}

/* remove spinner */
.shaka-spinner-container,
.shaka-spinner,
.shaka-spinner-svg{
display:none!important
}

.error-message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
background:rgba(255,0,0,.3);
padding:20px;
border-radius:8px;
display:none
}

/* TELEGRAM MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:rgba(0,0,0,.6);
display:flex;
justify-content:center;
align-items:center;
z-index:9999
}

.modal.hidden{display:none}

.modal-content{
background:#111;
padding:30px;
border-radius:14px;
max-width:380px;
width:90%;
text-align:center;
color:white
}

.modal-content h2{
margin-bottom:15px;
color:#facc15
}

.modal-content p{
margin-bottom:20px;
color:#ddd
}

.btn{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
font-size:15px
}

#joinButton{
background:#3b82f6;
color:white
}

#closeButton{
background:#333;
color:white
}

</style>
</head>

<body>

<!-- TELEGRAM MODAL -->

<div id="telegramModal" class="modal">

<div class="modal-content">

<h2>Join our Telegram</h2>

<p>
Stay updated with the latest
<strong>Live Match Links</strong>
</p>

<a href="https://t.me/SportsEera" target="_blank">

<button class="btn" id="joinButton">
Join Telegram
</button>

</a>

<button class="btn" id="closeButton">
Maybe Later
</button>

</div>
</div>

<div class="shaka-video-container" data-shaka-player>

<video autoplay muted playsinline></video>

</div>

<div id="errorMsg" class="error-message"></div>

<script>

const modal=document.getElementById("telegramModal");
const closeButton=document.getElementById("closeButton");

closeButton.onclick=()=>{
modal.classList.add("hidden");
initializePlayer();
};

async function initializePlayer(){

shaka.polyfill.installAll();

if(!shaka.Player.isBrowserSupported()){
showError("Browser not supported");
return;
}

const tvgId=new URLSearchParams(window.location.search).get("tvid");

if(!tvgId){
showError("Use ?tvid=s1");
return;
}

const COOKIE="__hdnea__=st=1772937061~exp=1773023461~acl=/*~hmac=3a2e43824ebda45f276c06795d7a46bbb661123adf4fde385b92f5a2bdb951e3";

const channels={

s1:{
name:"Sony Sports 1",
url:"https://jiotvpllive.cdn.jio.com/bpk-tv/SonyLIV_Sports_1_MOB/WDVLive/index.mpd",
kid:"4e4c5dba5bfe5a7c9338bc086eb80379",
key:"b8e8932f440084e1d2b705fa52eef94b"
},

s2:{
name:"Sony Sports 2",
url:"https://jiotvpllive.cdn.jio.com/bpk-tv/SonyLIV_Sports_2_MOB/WDVLive/index.mpd",
kid:"ef24516ae38b50d18049343cd1cd998a",
key:"eb4810ec250a1795a0019dba7881ff45"
}

};

if(!channels[tvgId]){
showError("Channel not found");
return;
}

const ch=channels[tvgId];

const video=document.querySelector("video");

const player=new shaka.Player(video);

const ui=new shaka.ui.Overlay(
player,
document.querySelector(".shaka-video-container"),
video
);

ui.configure({
controlPanelElements:[
"play_pause",
"time_and_duration",
"mute",
"volume",
"spacer",
"quality",
"fullscreen"
]
});

player.configure({
drm:{
clearKeys:{
[ch.kid]:ch.key
}
}
});

player.getNetworkingEngine().registerRequestFilter((type,request)=>{

request.headers["Referer"]="https://www.jiotv.com/";
request.headers["User-Agent"]="plaYtv/7.1.3 (Android)";
request.headers["Cookie"]=COOKIE;

});

player.addEventListener("error",e=>{
console.log(e);
showError("Playback error");
});

try{

await player.load(ch.url);

video.muted=true;
await video.play();

}

catch(e){

console.log(e);
showError("Stream failed");

}

}

function showError(msg){
const el=document.getElementById("errorMsg");
el.innerText=msg;
el.style.display="block";
}

</script>

</body>
</html>
