<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JioTV Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<style>

*{margin:0;padding:0;box-sizing:border-box}

html,body{
background:#000;
height:100vh;
width:100vw;
overflow:hidden;
font-family:system-ui,-apple-system,sans-serif
}

.shaka-video-container{
position:absolute;
inset:0;
width:100%;
height:100%
}

video{
width:100%;
height:100%;
background:#000;
object-fit:contain
}

.error-message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:#fff;
background:rgba(255,0,0,0.3);
padding:20px;
border-radius:8px;
display:none
}

/* Modal */

.modal{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
backdrop-filter:blur(6px);
background:rgba(0,0,0,0.4);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
animation:fadeIn .5s ease
}

.modal.hidden{display:none!important}

.modal-content{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:20px;
padding:30px 25px;
width:90%;
max-width:400px;
text-align:center;
color:#f3f4f6;
box-shadow:0 8px 32px rgba(0,0,0,0.4);
backdrop-filter:blur(12px);
transform:scale(.95);
animation:scaleIn .4s ease forwards
}

.modal-content h2{
font-size:24px;
font-weight:700;
color:#facc15;
margin-bottom:16px
}

.modal-content p{
font-size:16px;
color:#d1d5db;
margin-bottom:24px;
line-height:1.5
}

.modal-content strong{color:#fff}

.modal-content .btn{
width:100%;
padding:12px;
font-size:16px;
border:none;
border-radius:12px;
margin-bottom:12px;
cursor:pointer;
transition:.3s
}

#joinButton{
background:linear-gradient(to right,#3b82f6,#06b6d4);
color:#fff
}

#closeButton{
background:rgba(255,255,255,0.1);
color:#f3f4f6
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

@keyframes scaleIn{
to{transform:scale(1);opacity:1}
}

</style>
</head>

<body>

<!-- TELEGRAM MODAL -->

<div id="telegramModal" class="modal">
<div class="modal-content">

<h2>Join our Telegram</h2>

<p>
Stay updated with the latest
<strong>Live Match Links</strong>
and updates.
</p>

<a href="https://t.me/+7VkflslOE9s4YjQ9" target="_blank">
<button id="joinButton" class="btn">
Join Telegram
</button>
</a>

<button id="closeButton" class="btn">
Maybe Later
</button>

</div>
</div>

<div class="shaka-video-container" data-shaka-player>
<video autoplay playsinline preload="metadata"></video>
</div>

<div id="errorMsg" class="error-message"></div>

<script>

let allowPlayer=false;

const modal=document.getElementById("telegramModal");
const closeButton=document.getElementById("closeButton");

closeButton.onclick=()=>{
modal.classList.add("hidden");
allowPlayer=true;
initializePlayer();
};

async function initializePlayer(){

if(!allowPlayer) return;

shaka.polyfill.installAll();

if(!shaka.Player.isBrowserSupported()){
showError("Browser not supported");
return;
}

const tvgId=new URLSearchParams(window.location.search).get("tvid");

if(!tvgId){
showError("Add ?tvid=s1");
return;
}

const COOKIE="__hdnea__=st=1772937061~exp=1773023461~acl=/*~hmac=3a2e43824ebda45f276c06795d7a46bbb661123adf4fde385b92f5a2bdb951e3";

const channels={

s1:{
name:"Sony LIV Sports 1",
url:"https://jiotvpllive.cdn.jio.com/bpk-tv/SonyLIV_Sports_1_MOB/WDVLive/index.mpd",
keyId:"4e4c5dba5bfe5a7c9338bc086eb80379",
key:"b8e8932f440084e1d2b705fa52eef94b"
},

s2:{
name:"Sony LIV Sports 2",
url:"https://jiotvpllive.cdn.jio.com/bpk-tv/SonyLIV_Sports_2_MOB/WDVLive/index.mpd",
keyId:"ef24516ae38b50d18049343cd1cd998a",
key:"eb4810ec250a1795a0019dba7881ff45"
},

s3:{
name:"Sony LIV Sports 3",
url:"https://jiotvpllive.cdn.jio.com/bpk-tv/SonyLIV_Sports_3_MOB/WDVLive/index.mpd",
keyId:"3afa887864e6545aa006db21aeb39054",
key:"6b8cce271f3cd923d0df32d45b44f6df"
},

s5:{
name:"Sony LIV Sports 5",
url:"https://jiotvpllive.cdn.jio.com/bpk-tv/SonyLIV_Sports_5_MOB/WDVLive/index.mpd",
keyId:"cee8550bf50b569d8ad2ed0c5264f0d2",
key:"565a95f1c332c03534e1e5fcc1ff9a8b"
}

};

if(!channels[tvgId]){
showError("Channel not found");
return;
}

const ch=channels[tvgId];

document.title=ch.name+" - JioTV Player";

const video=document.querySelector("video");
const player=new shaka.Player(video);

player.configure({
drm:{
clearKeys:{
[ch.keyId]:ch.key
}
}
});

player.getNetworkingEngine().registerRequestFilter((type,request)=>{

request.headers["Referer"]="https://www.jiotv.com/";
request.headers["User-Agent"]="plaYtv/7.1.3 (Android)";

request.headers["Cookie"]=COOKIE;

if(
(type===shaka.net.NetworkingEngine.RequestType.MANIFEST ||
type===shaka.net.NetworkingEngine.RequestType.SEGMENT)
&& !request.uris[0].includes("__hdnea__=")
){
const sep=request.uris[0].includes("?")?"&":"?";
request.uris[0]+=sep+COOKIE;
}

});

player.addEventListener("error",e=>{
showError("Playback Error");
console.log(e);
});

try{

await player.load(ch.url);

video.play();

const ui=new shaka.ui.Overlay(
player,
document.querySelector(".shaka-video-container"),
video
);

ui.configure({
controlPanelElements:[
"play_pause",
"time_and_duration",
"mute",
"volume",
"spacer",
"quality",
"fullscreen"
]
});

}

catch(e){
showError("Stream failed to load");
}

}

function showError(msg){
const e=document.getElementById("errorMsg");
e.innerText=msg;
e.style.display="block";
}

</script>

</body>
</html>
